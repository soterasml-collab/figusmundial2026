//  FIGUBARRIO — PROTOTIPO FUNCIONAL CON MATCHING REAL
//  ─────────────────────────────────────────────────────────────
//  CÓMO PROBAR EL MATCHING CON OTRO "USUARIO":
//
//  1. Abrí esta app en UNA pestaña → registrate como Usuario A
//     → cargá tus figuritas repetidas (ej: #10, #23, #47)
//
//  2. Abrí OTRA pestaña del mismo navegador → registrate como

//
//  4. Hacé lo mismo al revés en la pestaña B.

//  El motor cruza automáticamente: mis_repetidas ∩ sus_faltan

// ─── STORAGE ENGINE — FIREBASE + localStorage fallback ────────────────────────
// Firebase para datos compartidos entre dispositivos
// localStorage como cache local y fallback
const DB = {
  // Guardar datos de un usuario en Firebase Y localStorage
  saveUser: async (userId, data) => {
    try {
      // Guardar en localStorage (inmediato)
      localStorage.setItem("fb_user_" + userId, JSON.stringify(data));
      // Guardar en Firebase (compartido entre dispositivos)
      if(window.fbDB) {
        await window.fbSetDoc(window.fbDoc(window.fbDB, "usuarios", userId), data);
      }
    } catch(e) { console.error("saveUser error:", e); }
  },
  // Leer datos de un usuario
  getUser: (userId) => {
    try { const d = localStorage.getItem("fb_user_" + userId); return d ? JSON.parse(d) : null; } catch(e) { return null; }
  },
  // Guardar figuritas en Firebase Y localStorage
  saveFigus: async (userId, albumId, figus) => {
    try {
      localStorage.setItem("fb_figus_" + userId + "_" + albumId, JSON.stringify(figus));
      if(window.fbDB) {
        // Limpiar figus — solo guardar strings válidos ("tengo" o "repetida")
        const figusSafe = {};
        Object.entries(figus).forEach(([k, v]) => {
          if(typeof v === "string" && (v === "tengo" || v === "repetida")) {
            figusSafe[k] = v;
          }
        });
        await window.fbSetDoc(
          window.fbDoc(window.fbDB, "figuritas", userId + "_" + albumId),
          { userId, albumId, figus: figusSafe, updatedAt: Date.now() }
        );
      }
    } catch(e) { console.error("saveFigus error:", e); }
  },
  // Leer figuritas — primero Firebase, luego localStorage
  getFigus: (userId, albumId) => {
    try { const d = localStorage.getItem("fb_figus_" + userId + "_" + albumId); return d ? JSON.parse(d) : {}; } catch(e) { return {}; }
  },
  // Leer figuritas de Firebase (async, para matching)
  getFigusFB: async (userId, albumId) => {
    try {
      if(window.fbDB) {
        const snap = await window.fbGetDoc(window.fbDoc(window.fbDB, "figuritas", userId + "_" + albumId));
        if(snap.exists()) return snap.data().figus || {};
      }
      const d = localStorage.getItem("fb_figus_" + userId + "_" + albumId);
      return d ? JSON.parse(d) : {};
    } catch(e) { return {}; }
  },
  // Listar todos los usuarios desde Firebase
  getAllUsers: () => {
    try {
      const users = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("fb_user_")) {
          const d = localStorage.getItem(key);
          if (d) users.push(JSON.parse(d));
        }
      }
      return users;
    } catch(e) { return []; }
  },
  // Cargar usuarios desde Firebase y guardar en localStorage
  syncUsuarios: async () => {
    try {
      if(!window.fbDB) return;
      const snap = await window.fbGetDocs(window.fbCollection(window.fbDB, "usuarios"));
      snap.forEach(d => {
        const data = d.data();
        localStorage.setItem("fb_user_" + data.userId, JSON.stringify(data));
      });
      console.log("Usuarios sincronizados desde Firebase:", snap.size);
    } catch(e) { console.error("syncUsuarios error:", e); }
  },
  // Cargar figuritas de todos desde Firebase
  syncFiguritas: async () => {
    try {
      if(!window.fbDB) return;
      const snap = await window.fbGetDocs(window.fbCollection(window.fbDB, "figuritas"));
      snap.forEach(d => {

        if (k && k.startsWith("fb_")) keys.push(k);

      keys.forEach(k => localStorage.removeItem(k));
    } catch(e) {}

// Obtener el lunes de la semana actual
function getLunesActual() {
  const hoy = new Date();
  const dia = hoy.getDay(); // 0=dom, 1=lun...
  const diff = dia === 0 ? -6 : 1 - dia;
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() + diff);
  lunes.setHours(0,0,0,0);
  return lunes;
}

// Semana actual como string clave (ej: "2026-W20")
function getSemanaKey() {
  const lunes = getLunesActual();
  const year = lunes.getFullYear();
  const start = new Date(year, 0, 1);
  const week = Math.ceil(((lunes - start) / 86400000 + start.getDay() + 1) / 7);
  return year + "-W" + String(week).padStart(2,"0");
}

// Generar código único de sobre
function generarCodigoSobre() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "FB-";
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

// Días hasta el próximo lunes
function diasHastaLunes() {
  const hoy = new Date();
  const dia = hoy.getDay();
  if(dia === 1) return 0; // hoy es lunes
  return dia === 0 ? 1 : 8 - dia;
}

// DB de reputación
const DBRep = {
  get: (userId) => {
    try {
      const d = localStorage.getItem("fb_rep_" + userId);
      return d ? JSON.parse(d) : { puntos:5, total:1, resenas:[] };
    } catch(e) { return { puntos:5, total:1, resenas:[] }; }
  },
  addResena: (userId, estrellas, comentario, deQuien) => {
    try {
      const rep = DBRep.get(userId);
      rep.resenas.unshift({ estrellas, comentario, deQuien, fecha: Date.now() });
      if(rep.resenas.length > 10) rep.resenas = rep.resenas.slice(0,10);
      rep.puntos = Math.round((rep.puntos * rep.total + estrellas) / (rep.total + 1) * 10) / 10;
      rep.total += 1;
      localStorage.setItem("fb_rep_" + userId, JSON.stringify(rep));
    } catch(e) {}
  },
  penalizar: (userId, puntos) => {
    try {
      const rep = DBRep.get(userId);
      rep.puntos = Math.max(1, rep.puntos - puntos);
      localStorage.setItem("fb_rep_" + userId, JSON.stringify(rep));
    } catch(e) {}
  },
};


// ═══════════════════════════════════════════════════════════
//  SISTEMA DE RESERVA DE FIGURITAS
//  Cuando se acepta un intercambio, las figuritas quedan
//  reservadas y no pueden matchear con nadie más.
//  Si se cancela, vuelven a estar disponibles.
// ═══════════════════════════════════════════════════════════
const DBReservas = {
  // Reservar figuritas para un intercambio
  reservar: (userId, figus, codigo) => {
    try {
      const key = "fb_reservas_" + userId;
      const d = localStorage.getItem(key);
      const reservas = d ? JSON.parse(d) : {};
      figus.forEach(f => { reservas[f] = codigo; });
      localStorage.setItem(key, JSON.stringify(reservas));
    } catch(e) {}
  },
  // Liberar figuritas (cuando se cancela)
  liberar: (userId, figus) => {
    try {
      const key = "fb_reservas_" + userId;
      const d = localStorage.getItem(key);
      if(!d) return;
      const reservas = JSON.parse(d);
      figus.forEach(f => { delete reservas[f]; });
      localStorage.setItem(key, JSON.stringify(reservas));
    } catch(e) {}
  },
  // Obtener figuritas reservadas de un usuario
  getReservas: (userId) => {
    try {
      const d = localStorage.getItem("fb_reservas_" + userId);
      return d ? JSON.parse(d) : {};
    } catch(e) { return {}; }
  },
  // Verificar si una figurita está disponible
  estaDisponible: (userId, figu) => {
    const reservas = DBReservas.getReservas(userId);
    return !reservas[figu];
  },
  // Liberar todas las reservas de un código de intercambio específico
  liberarPorCodigo: (userId, codigo) => {
    try {
      const key = "fb_reservas_" + userId;
      const d = localStorage.getItem(key);
      const reservas = d ? JSON.parse(d) : {};
      Object.keys(reservas).forEach(f => {
        if(reservas[f] === codigo) delete reservas[f];
      });
      localStorage.setItem(key, JSON.stringify(reservas));
    } catch(e) {}
  },
  // Filtrar solo las disponibles de una lista
  soloDisponibles: (userId, figus) => {
    const reservas = DBReservas.getReservas(userId);
    return figus.filter(f => !reservas[f]);
  },
};

//  SISTEMA DE RESERVAS — Primero en aceptar, primero en llevarse
//  Cuando alguien acepta un intercambio, sus figuritas
//  quedan RESERVADAS y no pueden matchear con nadie más.
//  Si cancela, las figuritas vuelven a estar disponibles.


// ─── MOTOR DE MATCHING ────────────────────────────────────────────────────────
// Lógica correcta:
//   - "repetida" = me sobra, la puedo dar
//   - "tengo"    = la tengo (una sola)
//   - no marcada = me falta → cualquiera puede dármela
function calcularMatches(miUserId, miAlbumId, miFigus, todosLosUsuarios) {
  const alb = ALBUMES.find(a => a.id === miAlbumId);
  const todasLasFigus = (typeof TODAS_LAS_FIGUS !== "undefined" && TODAS_LAS_FIGUS.length > 0)
    ? TODAS_LAS_FIGUS : (alb && alb.todas ? alb.todas : []);

  const misReservas = DBReservas.getReservas(miUserId);
  const misParaDar = Object.entries(miFigus)
    .filter(([k,v]) => v === "repetida" && !misReservas[k])
    .map(([k]) => k);
  const misMarcadas = new Set(Object.keys(miFigus));

  const matches = [];

  for (const otroUser of todosLosUsuarios) {
    if (otroUser.userId === miUserId) continue;
    if (otroUser.albumId !== miAlbumId) continue;
    const susFigus = DB.getFigus(otroUser.userId, miAlbumId);
    if (!susFigus || Object.keys(susFigus).length === 0) continue;
    const susReservas = DBReservas.getReservas(otroUser.userId);
    const susParaDar = Object.entries(susFigus)
      .filter(([k,v]) => v === "repetida" && !susReservas[k])
      .map(([k]) => k);
    const susMarcadas = new Set(Object.keys(susFigus));

    // Lo que me falta = lo que NO tengo marcado (ni verde ni azul)
    // Lo que al otro le falta = lo que él NO tiene marcado
    // Si tenemos la lista completa la usamos, sino comparamos entre ellos
    let yoLeDoy, elMeDa;
    if (todasLasFigus.length > 0) {
      const misFaltantes  = new Set(todasLasFigus.filter(c => !misMarcadas.has(c)));
      const susFaltantes  = new Set(todasLasFigus.filter(c => !susMarcadas.has(c)));
      yoLeDoy = misParaDar.filter(c => susFaltantes.has(c));
      elMeDa  = susParaDar.filter(c => misFaltantes.has(c));
    } else {
      // Fallback: lo que el otro no tiene marcado le falta
      yoLeDoy = misParaDar.filter(c => !susMarcadas.has(c));
      elMeDa  = susParaDar.filter(c => !misMarcadas.has(c));
    }

    if (yoLeDoy.length > 0 && elMeDa.length > 0) {
      // Intercambio equitativo — ambos dan la misma cantidad
      const cantidad = Math.min(yoLeDoy.length, elMeDa.length);
      matches.push({
        userId: otroUser.userId, apodo: otroUser.apodo,
        barrio: otroUser.barrio, edad: otroUser.edad,
        esAdulto: otroUser.edad >= 18, avatar: otroUser.avatar,
        yoLeDoy: yoLeDoy.slice(0, cantidad),
        elMeDa:  elMeDa.slice(0, cantidad),
        yoLeDoyExtra: yoLeDoy.slice(cantidad),
        elMeDaExtra:  elMeDa.slice(cantidad),
        score: cantidad * 2,
      });
    }
  }
  return matches.sort((a, b) => b.score - a.score);
}

// ─── MATCHES ──────────────────────────────────────────────────────────────────
function MatchesScreen({user, figus, onOpenChat, onVerSobre}) {
  const [matches, setMatches] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [matchActivo, setMatchActivo] = useState(null);

  useEffect(()=>{
    const buscarMatches = async () => {
      // Primero verificar si hay un match activo (aceptado pero no completado)
      // Buscar en Firebase si hay un chat activo con este usuario
      if(window.fbDB) {
        try {
          const snap = await window.fbGetDocs(window.fbCollection(window.fbDB, "chats"));
          snap.forEach(d => {
            const data = d.data();
            const claveChat = d.id;
            // Ver si este chat me involucra y está activo
            if(claveChat.includes(user.userId)) {
              const estaActivo = (data.estadoA === "aceptado" || data.estadoB === "aceptado") 
                && data.estado !== "completado" 
                && data.estado !== "anulado";
              if(estaActivo) {
                // Guardar en localStorage para que el chat lo encuentre
                localStorage.setItem(claveChat, JSON.stringify(data));
                setMatchActivo({claveChat, ...data});
              }
            }
          });
        } catch(e) { console.error("buscar chat activo error:", e); }
      }

      // Sincronizar desde Firebase antes de calcular matches
      await DB.syncUsuarios();
      await DB.syncFiguritas();
      // Buscar nuevos matches — usar figus del estado React (más fresco que localStorage)
      const todos = DB.getAllUsers();
      const result = calcularMatches(user.userId, user.albumId, figus, todos);
      setMatches(result);
      setCargando(false);
    };
    buscarMatches();
  }, [user.userId, user.albumId, figus]);

          const yoLeDoy = soyA ? (matchActivo.figusDe || []) : (matchActivo.figusParA || []);

            <div>

      {cargando ? (

      ) : matches.length === 0 ? (

      ) : (

      {matchActivo && (

            const otroUserId = matchActivo.userA === user.userId ? matchActivo.userB : matchActivo.userA;

          {matches.map(m => {

                    {(() => {

                </div>
                {/* Figuritas reales del match */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>

                  {puedeDirecto&&<div style={{background:C.gold,color:C.blueDeep,fontSize:10,fontWeight:900,padding:"3px 8px",borderRadius:6,border:`2px solid ${C.goldDeep}`,boxShadow:`2px 2px 0 ${C.goldDeep}`}}>🤝 Directo</div>}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
// ESTADOS del chat:
// "propuesta"  → match encontrado, esperando que ambos acepten
// "esperando"  → yo acepté, esperando al otro
// "aceptado"   → los dos aceptaron → mostrar punto + sobre
// "cancelado"  → alguno rechazó

function ChatScreen({match, user, onBack, onVerTicket, onFigurasEntregadas}) {
  const esAdultoAmbos = user.edad >= 18 && match.esAdulto;

  // ── FIREBASE GUARD ─────────────────────────────────────────
  // Esperar a que Firebase esté listo antes de operar
  // Crítico en celulares donde Firebase carga más lento
  const fbReady = async () => {
    let intentos = 0;
    while(!window.fbDB && intentos < 10) {
      await new Promise(r => setTimeout(r, 300));
      intentos++;
    }
    return !!window.fbDB;
  };
  const [isFirebaseReady, setIsFirebaseReady] = useState(!!window.fbDB);
  useEffect(() => {
    fbReady().then(ready => setIsFirebaseReady(ready));
  }, []);
  // Si match.userId está vacío (viene de "Ver intercambio"), 
  // reconstruir claveChat desde Firebase buscando el chat activo
  const [claveChat, setClaveChat] = useState(
    match.userId 
      ? ["fb_chat", user.userId, match.userId].sort().join("_")
      : null
  );

  // Si no hay claveChat, buscarla en Firebase
  useEffect(() => {
    if(!claveChat && window.fbDB) {
      window.fbGetDocs(window.fbCollection(window.fbDB, "chats")).then(snap => {
        snap.forEach(d => {
          const data = d.data();
          if(d.id.includes(user.userId) && 
             (data.estadoA === "aceptado" || data.estadoB === "aceptado") &&
             data.estado !== "completado" && data.estado !== "anulado") {
            setClaveChat(d.id);
            localStorage.setItem(d.id, JSON.stringify(data));
          }
        });
      });
    }
  }, []);

  // Estado compartido del chat (simulado via localStorage)
  const getChatState = () => {
    try {
      if(!claveChat) return { estadoA: "pendiente", estadoB: "pendiente", msgs: [], codigo: null, punto: null };
      const d = localStorage.getItem(claveChat);
      if(!d) return { estadoA: "pendiente", estadoB: "pendiente", msgs: [], codigo: null, punto: null };
      const parsed = JSON.parse(d);
      // Si el chat local ya está completado, ignorarlo — Firebase confirmará
      if(parsed.estado === "completado") {
        localStorage.removeItem(claveChat);
        return { estadoA: "pendiente", estadoB: "pendiente", msgs: [], codigo: null, punto: null };
      }
      return parsed;
    } catch(e) { return { estadoA: "pendiente", estadoB: "pendiente", msgs: [], codigo: null, punto: null }; }
  };
  const saveChatState = async (s) => {
    try {
      if(!claveChat) { console.error("saveChatState: claveChat es null!"); return; }
      // Guardar en localStorage (inmediato)
      localStorage.setItem(claveChat, JSON.stringify(s));
      // Guardar en Firebase (compartido entre dispositivos)
      if(window.fbDB) {
            await window.fbSetDoc(
          window.fbDoc(window.fbDB, "chats", claveChat),
          { ...s, updatedAt: Date.now() }
        );
      } else {
        console.error("Firebase NO disponible al guardar chat!");
      }
    } catch(e) { console.error("saveChatState error:", e); }
  };
  // Sincronizar estado del chat desde Firebase cada 3 segundos
  useEffect(() => {
    const syncChat = async () => {
      if(window.fbDB) {
        try {
          const snap = await window.fbGetDoc(window.fbDoc(window.fbDB, "chats", claveChat));
          if(snap.exists()) {
            const data = snap.data();
            // Si el chat está completado, actualizar UI y luego limpiar localStorage
            if(data.estado === "completado") {
              setChatState(data);
              localStorage.removeItem(claveChat);
              return;
            }
            // Siempre actualizar desde Firebase — no comparar timestamps
            localStorage.setItem(claveChat, JSON.stringify(data));
            setChatState(prev => {
              // Solo re-renderizar si algo cambió
              if(JSON.stringify(prev) !== JSON.stringify(data)) return data;
              return prev;
            });

          }
        } catch(e) {}
      }
    };
    syncChat();
    const interval = setInterval(syncChat, 2000); // cada 2 segundos
    return () => clearInterval(interval);
  }, [claveChat]);

  // Identidad dinámica — siempre basada en el documento de Firebase
  // Nunca estática para evitar que los IDs se crucen entre dispositivos
  const chatStateInit = getChatState();
  const soyA = chatStateInit.userA
    ? chatStateInit.userA === user.userId
    : user.userId < match.userId;
  const [chatState, setChatState] = useState(getChatState);
  const [msgLibre, setMsgLibre] = useState("");
  const [advertenciaVista, setAdvertenciaVista] = useState(false);
  const [cargandoChat, setCargandoChat] = useState(true);
  // Si no hay claveChat todavía, mostrar cargando
  const chatListo = !!claveChat;
  // Estado local para figuritas — se restaura desde Firebase si es necesario
  const [matchFigus, setMatchFigus] = useState({
    yoLeDoy: match.yoLeDoy || [],
    elMeDa:  match.elMeDa  || [],
  });

  // Cargar estado del chat desde Firebase al abrir
  useEffect(() => {
    const cargarChat = async () => {
      if(window.fbDB) {
        try {
          const snap = await window.fbGetDoc(window.fbDoc(window.fbDB, "chats", claveChat));
          if(snap.exists()) {
            const data = snap.data();
            // Si el intercambio anterior ya se completó, ignorarlo y arrancar uno nuevo
            if(data.estado === "completado") {
              localStorage.removeItem(claveChat);
              setCargandoChat(false);
              return;
            }
            localStorage.setItem(claveChat, JSON.stringify(data));
            setChatState(data);
            // Restaurar figuritas desde Firebase siempre que existan
            if(data.figusDe && data.figusParA) {
              const soyA_load = data.userA === user.userId;
              setMatchFigus({
                yoLeDoy: soyA_load ? data.figusDe : data.figusParA,
                elMeDa:  soyA_load ? data.figusParA : data.figusDe,
              });
            }
            // Si ambos aceptaron → ir directo al sobre
            if(data.estadoA === "aceptado" && data.estadoB === "aceptado") {
              setAdvertenciaVista(true);
            }
          }
        } catch(e) { console.error("cargarChat error:", e); }
      }
      setCargandoChat(false);
    };
    cargarChat();
  }, [claveChat]);



  const miEstado    = soyA ? chatState.estadoA : chatState.estadoB;
  const otroEstado  = soyA ? chatState.estadoB : chatState.estadoA;
  const ambosAceptaron = chatState.estadoA === "aceptado" && chatState.estadoB === "aceptado";
  const yoAcepte    = miEstado === "aceptado";
  const algoCancelo = miEstado === "cancelado" || otroEstado === "cancelado";

  const handleAceptar = async () => {
    const ready = await fbReady();
    if(!ready) {
      alert("Conectando con el servidor... Reintentá en 2 segundos.");
      return;
    }
    if(!claveChat) return;
    const chatRef = window.fbDoc(window.fbDB, "chats", claveChat);
    try {
      // La transacción devuelve el nuevo estado para usarlo DESPUÉS
      const nuevoEstadoCalculado = await window.fbRunTransaction(window.fbDB, async (transaction) => {
        const chatDoc = await transaction.get(chatRef);
        let s = chatDoc.exists() ? chatDoc.data() : {
          estadoA: "pendiente", estadoB: "pendiente",
          msgs: [], codigo: null, punto: null,
          userA: soyA ? user.userId : match.userId,
          apodoA: soyA ? user.apodo : match.apodo,
          userB: soyA ? match.userId : user.userId,
          apodoB: soyA ? match.apodo : user.apodo,
          figusDe: soyA ? matchFigus.yoLeDoy : matchFigus.elMeDa,
          figusParA: soyA ? matchFigus.elMeDa : matchFigus.yoLeDoy,
        };
        const soyA_real = s.userA ? s.userA === user.userId : soyA;
        const updates = { updatedAt: window.fbTimestamp() };

        if(soyA_real) updates.estadoA = "aceptado";
        else updates.estadoB = "aceptado";
        if(!s.codigo) updates.codigo = generarCodigoSobre();
        if(!s.createdAt) updates.createdAt = window.fbTimestamp();

        const nA = updates.estadoA || s.estadoA;
        const nB = updates.estadoB || s.estadoB;
        if(nA === "aceptado" && nB === "aceptado") {
          updates.punto = "Librería Papira · Tinogasta 3960";
          updates.estado = "acordado";
        }
        const msgs = [...(s.msgs || [])];
        msgs.push({
          texto: "✅ ¡Acepto el cambio!",
          de: user.apodo,
          hora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})
        });
        updates.msgs = msgs;
        const finalData = {...s, ...updates};

        if(chatDoc.exists()) transaction.update(chatRef, updates);
        else transaction.set(chatRef, finalData);
        return finalData;
      });

      // ÉXITO: Actualizamos React FUERA de la transacción
      setChatState(nuevoEstadoCalculado);
      localStorage.setItem(claveChat, JSON.stringify(nuevoEstadoCalculado));

      // Reservar figuritas solo si la transacción fue exitosa
      if(nuevoEstadoCalculado.codigo && matchFigus.yoLeDoy.length > 0) {
        DBReservas.reservar(user.userId, matchFigus.yoLeDoy, nuevoEstadoCalculado.codigo);
      }
    } catch(e) {
      console.error("Fallo crítico en la transacción:", e);
      if(e.code === 'permission-denied') {
        alert("Sin permiso. La página se va a recargar para reconectar.");
        window.location.reload();
      } else if(e.code === 'unavailable') {
        alert("Sin conexión. Verificá tu internet y reintentá.");
      } else {
        // Error SES u otro error de móvil — recargar para limpiar memoria
        alert("Error de conexión. La página se va a recargar automáticamente.");
        setTimeout(() => window.location.reload(), 1500);
      }
    }
  };

  const handleCancelar = async () => {
    const s = getChatState();
    if(soyA) s.estadoA = "cancelado"; else s.estadoB = "cancelado";

    // Liberar mis figuritas reservadas — vuelven a estar disponibles
    DBReservas.liberar(user.userId, match.yoLeDoy);

    s.msgs = [...(s.msgs||[]), {
      texto: "❌ Rechacé el intercambio.",
      de: user.apodo,
      hora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})
    }];
    await saveChatState(s);
    setChatState({...s});
  };

  const handleMsgLibre = async () => {
    if(!msgLibre.trim()) return;
    const s = getChatState();
    s.msgs = [...(s.msgs||[]), {
      texto: msgLibre.trim(),
      de: user.apodo,
      hora: new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})
    }];
    await saveChatState(s);
    setChatState({...s});
    setMsgLibre("");
  };

  const C_GOLD = "#F5C518";

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",maxHeight:"100vh",background:C.bluePale,overflow:"hidden"}}>
      {/* TOP BAR */}
      <div style={{background:`linear-gradient(90deg,${C.blue} 0%,${C.blueDark} 100%)`,
        borderBottom:`2px solid ${C.blueDark}`,padding:"12px 16px",
        display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.4)",
          color:"white",fontSize:18,cursor:"pointer",borderRadius:10,
          width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <div style={{width:36,height:36,borderRadius:10,background:C.bluePale,
          border:`2px solid ${C.blueDark}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <AvatarSticker av={match.avatar} size={28}/>

        {/* ESTADO: YO ACEPTÉ, ESPERANDO AL OTRO */}

        {/* ESTADO: PROPUESTA — aviso de paciencia */}

                      .seccion { border-bottom:1px solid black; padding-bottom:0.2cm; }

                      .sec-val { font-size:12pt; font-weight:900; }
                      .sec-sub { font-size:10pt; font-weight:700; }
                      .punto { margin-top:auto; text-align:center; }
                      .punto-label { font-size:7pt; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#555; }

                      @media print { body { margin:0; } }
                    </style></head><body>
                    <div class="etiqueta">
                      <div class="header">
                        <div class="logo">🃏 FiguBarrio</div>
                        <div class="sub">Mundial FIFA 2026</div>
                      </div>
                      <div class="codigo-box">
                        <div class="codigo-label">Código de intercambio</div>
                        <div class="codigo-num">${codigo}</div>
                        <div class="sec-sub">${semana} · Vence en 15 días</div>
                      </div>
                      <div class="seccion">
                        <div class="sec-label">── DE ─────────────────────</div>
                        <div class="sec-val">Usuario: ${user.apodo}</div>
                        <div class="sec-sub">Tel: +54 9 11 ${user.telefono}</div>
                      </div>
                      <div class="seccion">
                        <div class="sec-label">── PARA ────────────────────</div>
                        <div class="sec-val">Usuario: ${match.apodo}</div>
                      </div>
                      <div class="seccion">
                        <div class="sec-label">── FIGURITAS ADENTRO ───────</div>
                        <div class="sec-val" style="font-size:11pt">${figus}</div>
                      </div>
                      <div class="punto">
                        <div class="punto-label">Punto de retiro</div>
                        <div class="punto-val">Librería Papira</div>
                        <div class="sec-sub">Tinogasta 3960 · Villa Devoto</div>

                    <script>window.onload=()=>{window.print();}<\/script>
                    </body></html>`;
                    const win = window.open("","_blank","width=500,height=700");

                  }}

                    cursor:"pointer",boxShadow:`3px 3px 0 ${C.blueDark}`}}>
                  🖨️ Imprimir etiqueta del sobre
                </button>

                {/* BOTONES DE ACCIÓN SEGÚN ESTADO */}
                {(() => {

                          s.updatedAt = Date.now();
                          await saveChatState(s);
                          setChatState({...s});
                        }} style={{
                          width:"100%",background:C.blue,color:"white",
                          border:`2px solid ${C.blueDark}`,borderRadius:12,padding:"12px",
                          fontFamily:"'Paytone One',cursive",fontSize:14,cursor:"pointer",
                          boxShadow:`3px 3px 0 ${C.blueDark}`}}>
                          📦 Ya dejé mi sobre
                        </button>
                      )}

                      {yoDejeElSobre && !elOtroDejoElSobre && (
                        <div style={{background:`${C.blue}18`,border:`2px solid ${C.blue}`,
                          borderRadius:12,padding:12,fontSize:13,fontWeight:700,
                          color:C.blueDark,textAlign:"center"}}>
                          ✅ Dejaste tu sobre. Esperando que el otro también deje el suyo...
                        </div>
                      )}

                      {/* PASO 2: Confirmar recibo — aparece en semana 2 */}
                      {yoDejeElSobre && elOtroDejoElSobre && !yoRecibiElSobre && (
                        <button onClick={async () => {
                          const s = getChatState();
                          if(soyA_btn) s.recibiA = true; else s.recibiB = true;
                          if(s.recibiA && s.recibiB) s.estado = "completado";
                          s.updatedAt = Date.now();
                          await saveChatState(s);
                          setChatState({...s});
                          // Si ambos confirmaron, esperar que el otro sincronice
                          // y recién después borrar el doc de Firebase
                          if(s.recibiA && s.recibiB && window.fbDB) {
                            setTimeout(async () => {
                              try {
                                await window.fbDeleteDoc(window.fbDoc(window.fbDB, "chats", claveChat));
                                localStorage.removeItem(claveChat);
                              } catch(e) { console.error("Error borrando chat:", e); }
                            }, 6000); // 6 segundos — tiempo para que el otro sincronice
                          }
                          // Borrar del álbum las figuritas que YO entregué
                          // (ya no las tengo — se las di al otro)
                          if(onFigurasEntregadas && matchFigus.yoLeDoy.length > 0) {
                            onFigurasEntregadas(matchFigus.yoLeDoy);
                          }

                          width:"100%",background:C.green,color:"white",
                          border:`2px solid ${C.greenDeep}`,borderRadius:12,padding:"12px",
                          fontFamily:"'Paytone One',cursive",fontSize:14,cursor:"pointer",
                          boxShadow:`3px 3px 0 ${C.greenDeep}`}}>
                          ✅ Ya recibí mi sobre
                        </button>
                      )}

                      {yoRecibiElSobre && chatState.estado !== "completado" && (
                        <div style={{background:`${C.green}18`,border:`2px solid ${C.green}`,
                          borderRadius:12,padding:12,fontSize:13,fontWeight:700,
                          color:C.greenDeep,textAlign:"center"}}>
                          ✅ Confirmaste que recibiste. Esperando que el otro confirme también...
                        </div>
                      )}

                      {chatState.estado === "completado" && (
                        <div style={{background:`${C.green}18`,border:`2px solid ${C.green}`,
                          borderRadius:14,padding:14,fontSize:14,fontWeight:700,
                          color:C.greenDeep,textAlign:"center"}}>
                          🎉 ¡Intercambio completado! Los dos confirmaron.
                        </div>
                      )}

                      {/* CANCELAR */}
                      {!yoDejeElSobre && (
                        <button onClick={async () => {
                          const s = getChatState();
                          s.estado = "anulado";
                          s.updatedAt = Date.now();
                          await saveChatState(s);
                          setChatState({...s});
                        }} style={{
                          width:"100%",background:"white",color:C.red,
                          border:`2px solid ${C.red}`,borderRadius:12,padding:"10px",
                          fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:900,
                          cursor:"pointer"}}>
                          ↩️ No puedo, quiero retirar lo que dejé
                        </button>
                      )}
                    </div>
                  );
                })()}
              </>
            )}

            {/* CHAT LIBRE PARA ADULTOS */}
            {esAdultoAmbos && advertenciaVista && (
              <div style={{background:"white",border:`2px solid ${C.blueLight}`,borderRadius:14,padding:12}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:900,textTransform:"uppercase",
                  letterSpacing:1,marginBottom:8}}>💬 Chat (solo adultos)</div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    value={msgLibre}
                    onChange={e=>setMsgLibre(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&msgLibre.trim()){handleMsgLibre();}}}
                    placeholder="Escribí un mensaje..."
                    style={{flex:1,background:C.bluePale,border:`2px solid ${C.blue}`,
                      borderRadius:10,padding:"9px 12px",color:C.blueDeep,
                      fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:700,
                      outline:"none",minWidth:0}}/>
                  <button
                    onClick={()=>{ if(msgLibre.trim()) handleMsgLibre(); }}
                    style={{background:C.blue,color:"white",border:`2px solid ${C.blueDark}`,
                      borderRadius:10,padding:"0 16px",fontFamily:"'Paytone One',cursive",
                      fontSize:13,cursor:"pointer",boxShadow:`2px 2px 0 ${C.blueDark}`,
                      flexShrink:0,height:42}}>
                    Enviar
                  </button>
                </div>
              </div>
            )}
          </>
        )}

        <div style={{height:20}}/>
      </div>
    </div>
  );
}

function ContactosScreen({user}) {
  // C es la paleta global definida como const C = {...}
  const [codigo, setCodigo] = useState("");
  const [contactos, setContactos] = useState([]);
  const [buscando, setBuscando] = useState(false);
  const [error, setError] = useState("");
  const [exito, setExito] = useState("");
  const [albumVisto, setAlbumVisto] = useState(null);
  const [albumFigus, setAlbumFigus] = useState(null);
  const [cargandoAlbum, setCargandoAlbum] = useState(false);

  // Cargar contactos desde localStorage
  useEffect(() => {
    try {
      const guardados = JSON.parse(localStorage.getItem("ctc_" + user.userId) || "[]");
      setContactos(guardados);
    } catch(e) {}
  }, []);

  const guardar = (lista) => {
    setContactos(lista);
    localStorage.setItem("ctc_" + user.userId, JSON.stringify(lista));
  };

  const buscar = async () => {
    if(!codigo.trim()) return;
    setError(""); setExito(""); setBuscando(true);
    try {
      const id = codigo.trim().endsWith("_1") ? codigo.trim() : codigo.trim() + "_1";
      const snap = await window.fbGetDoc(window.fbDoc(window.fbDB, "usuarios", id));
      if(!snap.exists()) {
        setError("No encontramos ese código. Pedíselo a tu amigo.");
      } else {
        const d = snap.data();
        if(d.userId === user.userId) {
          setError("Ese es tu propio código 😄");
        } else if(contactos.find(c => c.userId === d.userId)) {
          setError("Ya lo tenés en tus contactos.");
        } else {
          const nuevo = {userId: d.userId, apodo: d.apodo, barrio: d.barrio, avatar: d.avatar};
          guardar([...contactos, nuevo]);
          setExito("¡" + d.apodo + " agregado! 🎉");
          setCodigo("");
        }
      }
    } catch(e) {
      setError("Error al buscar. Intentá de nuevo.");
    }
    setBuscando(false);
  };

  const verAlbum = async (c) => {
    setAlbumVisto(c);
    setCargandoAlbum(true);
    setAlbumFigus(null);
    try {
      const snap = await window.fbGetDoc(window.fbDoc(window.fbDB, "usuarios", c.userId + "_1"));
      if(snap.exists()) setAlbumFigus(snap.data().figus || {});
    } catch(e) {}
    setCargandoAlbum(false);
  };

  const miCodigo = user.userId;
  const msgWA = encodeURIComponent("¡Hola! Usá mi código para agregarme en Figus Mundial 2026 🌍⚽\n\n" + miCodigo + "\n\nDescargá la app: https://soterasml-collab.github.io/figubarrio");

  // Pantalla de álbum ajeno
  if(albumVisto) {
    const tengo = albumFigus ? Object.entries(albumFigus).filter(([k,v])=>v==="tengo").map(([k])=>k) : [];
    const repetidas = albumFigus ? Object.entries(albumFigus).filter(([k,v])=>v==="repetida").map(([k])=>k) : [];
    return (
      <div className="screen">
        <div className="pheader">
          <StickerBg opacity={0.12}/>
          <div className="pheader-inner">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>{setAlbumVisto(null);setAlbumFigus(null);}}
                style={{background:"rgba(255,255,255,.25)",border:"none",borderRadius:8,
                  padding:"4px 12px",color:"white",fontFamily:"'Paytone One',cursive",
                  fontSize:13,cursor:"pointer"}}>← Volver</button>
              <div className="stitle stitle-w">📖 {albumVisto.apodo}</div>
            </div>
          </div>
        </div>
        <div style={{padding:16}}>
          {cargandoAlbum && <div style={{textAlign:"center",padding:40,color:C.muted,fontWeight:700}}>Cargando...</div>}
          {!cargandoAlbum && albumFigus && (<>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{flex:1,background:"white",border:"2px solid "+C.green,borderRadius:12,padding:12,textAlign:"center",boxShadow:"3px 3px 0 "+C.greenDeep}}>
                <div style={{fontFamily:"'Paytone One',cursive",fontSize:26,color:C.green}}>{tengo.length}</div>
                <div style={{fontSize:11,fontWeight:700,color:C.muted}}>✅ Tiene</div>
              </div>
              <div style={{flex:1,background:"white",border:"2px solid "+C.blue,borderRadius:12,padding:12,textAlign:"center",boxShadow:"3px 3px 0 "+C.blueDark}}>
                <div style={{fontFamily:"'Paytone One',cursive",fontSize:26,color:C.blue}}>{repetidas.length}</div>
                <div style={{fontSize:11,fontWeight:700,color:C.muted}}>🔁 Para dar</div>
              </div>
            </div>
            {repetidas.length > 0 && (
              <div style={{background:"white",border:"2px solid "+C.blue,borderRadius:14,padding:14,marginBottom:12,boxShadow:"3px 3px 0 "+C.blueDark}}>
                <div style={{fontFamily:"'Paytone One',cursive",fontSize:13,color:C.blueDark,marginBottom:8}}>🔁 Le sobran para dar</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {repetidas.map(f=><span key={f} style={{background:C.blueLight,border:"1px solid "+C.blue,borderRadius:6,padding:"3px 8px",fontSize:12,fontWeight:700,color:C.blueDark}}>#{f}</span>)}
                </div>
              </div>
            )}
            {tengo.length > 0 && (
              <div style={{background:"white",border:"2px solid "+C.green,borderRadius:14,padding:14,boxShadow:"3px 3px 0 "+C.greenDeep}}>
                <div style={{fontFamily:"'Paytone One',cursive",fontSize:13,color:C.greenDeep,marginBottom:8}}>✅ Ya tiene pegadas</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {tengo.map(f=><span key={f} style={{background:"#e8f5e9",border:"1px solid "+C.green,borderRadius:6,padding:"3px 8px",fontSize:12,fontWeight:700,color:C.greenDeep}}>#{f}</span>)}
                </div>
              </div>
            )}
          </>)}
        </div>
      </div>
    );
  }

  return (
    <div className="screen">
      <div className="pheader">
        <StickerBg opacity={0.12}/>
        <div className="pheader-inner">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div className="stitle stitle-w">👥 Mis Contactos</div>
            <S.Pelota size={48}/>
          </div>
        </div>
      </div>
      <div style={{padding:16}}>

        {/* Mi código */}
        <div style={{background:"white",border:"2px solid "+C.blue,borderRadius:14,padding:14,marginBottom:14,boxShadow:"3px 3px 0 "+C.blueDark}}>
          <div style={{fontFamily:"'Paytone One',cursive",fontSize:13,color:C.blueDark,marginBottom:6}}>🪪 Mi código</div>
          <div style={{background:C.blueLight,borderRadius:8,padding:"8px 12px",fontFamily:"monospace",fontSize:11,fontWeight:700,color:C.blueDark,wordBreak:"break-all",marginBottom:10}}>
            {miCodigo}
          </div>
          <a href={"https://wa.me/?text="+msgWA} target="_blank" rel="noopener noreferrer"
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              background:"#25D366",borderRadius:10,padding:"9px 14px",textDecoration:"none"}}>
            <span style={{fontSize:18}}>📲</span>
            <span style={{fontFamily:"'Paytone One',cursive",fontSize:13,color:"white"}}>Invitar por WhatsApp</span>
          </a>
        </div>

        {/* Agregar contacto */}
        <div style={{background:"white",border:"2px solid "+C.sky,borderRadius:14,padding:14,marginBottom:14,boxShadow:"3px 3px 0 "+C.sky}}>
          <div style={{fontFamily:"'Paytone One',cursive",fontSize:13,color:C.blueDark,marginBottom:8}}>➕ Agregar contacto</div>
          <div style={{display:"flex",gap:8,marginBottom:6}}>
            <input value={codigo} onChange={e=>setCodigo(e.target.value)}
              placeholder="Pegá el código de tu amigo..."
              style={{flex:1,border:"2px solid "+C.sky,borderRadius:8,padding:"8px 10px",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
            <button onClick={buscar} disabled={buscando}
              style={{background:C.blue,color:"white",border:"2px solid "+C.blueDark,
                borderRadius:8,padding:"8px 14px",fontFamily:"'Paytone One',cursive",
                fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
              {buscando?"...":"Buscar"}

          </div>
          {error && <div style={{fontSize:12,color:"#e53",fontWeight:700}}>{error}</div>}
          {exito && <div style={{fontSize:12,color:C.green,fontWeight:700}}>{exito}</div>}
        </div>

        {/* Lista */}
        {contactos.length === 0 ? (
          <div style={{textAlign:"center",padding:"30px 16px",color:C.muted,fontWeight:700,fontSize:14,lineHeight:1.8}}>
            Todavía no tenés contactos.<br/>¡Compartí tu código y agregá amigos! 👆
          </div>
        ) : contactos.map(c=>(
          <div key={c.userId} style={{background:"white",border:"2px solid "+C.blueLight,borderRadius:14,padding:14,marginBottom:10,boxShadow:"3px 3px 0 "+C.blueLight,display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:30}}>{c.avatar||"🧑"}</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Paytone One',cursive",fontSize:15,color:C.blueDark}}>{c.apodo}</div>

            <button onClick={()=>verAlbum(c)}
              style={{background:C.blue,color:"white",border:"2px solid "+C.blueDark,

                fontSize:12,cursor:"pointer"}}>

  );
}

      <button
        onClick={()=>{
          const texto = `🃏 FiguBarrio me ayuda a ahorrar ${fmt(ahorroPersona)} en el álbum del Mundial 2026. ¡Descargala y cambiá figuritas con vecinos del barrio! 🇦🇷`;
          if(navigator.share) {
            navigator.share({ title:"FiguBarrio", text:texto });
          } else {
            navigator.clipboard.writeText(texto);
            alert("¡Texto copiado! Pegalo donde quieras.");
          }
        }}
        style={{width:"100%",background:C.gold,color:C.blueDeep,
          border:`2px solid ${C.goldDeep}`,borderRadius:14,padding:"13px",
          fontFamily:"'Paytone One',cursive",fontSize:15,cursor:"pointer",
          boxShadow:`3px 3px 0 ${C.goldDeep}`,marginTop:14}}>
        📣 Compartir este ahorro
      </button>

      <div style={{height:20}}/>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
export default function App() {
  const [user, setUser]             = useState(null);
  const [tab, setTab]               = useState("home");
  const [chatMatch, setChatMatch]   = useState(null);
  const [ticketData, setTicketData] = useState(null);
  const [figus, setFigus]           = useState({});
  const [matchCount, setMatchCount] = useState(0);
  const [adsEnabled, setAdsEnabled] = useState(true);
  // Al cargar, sincronizar datos de Firebase
  useEffect(() => {
    Promise.all([DB.syncUsuarios(), DB.syncFiguritas()]).then(() => {
      // Verificar si hay sesión guardada en localStorage
      const savedUserId = localStorage.getItem("fb_current_user");
      if(savedUserId) {
        const perfil = DB.getUser(savedUserId);
        if(perfil) {
          const prevFigus = DB.getFigus(perfil.userId, perfil.albumId);
          setFigus(prevFigus);
          setUser(perfil);
        }
      }
    });
  }, []);
  const [sobreActivo, setSobreActivo] = useState(null);
  const [pendienteConfirm, setPendienteConfirm] = useState(null);

  // Al registrarse: guardar en Firebase y sincronizar usuarios
  const handleRegister = async form => {
    // Usar Google UID si está disponible, sino generar uno
    const gUser = window.fbAuth ? window.fbAuth.currentUser : null;
    const userId = gUser ? "google_" + gUser.uid : "user_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
    const userData = { ...form, userId, albumId: form.album };
    // Sincronizar usuarios existentes desde Firebase primero
    await DB.syncUsuarios();
    await DB.syncFiguritas();
    // Guardar el nuevo usuario
    await DB.saveUser(userId, userData);
    const prevFigus = DB.getFigus(userId, form.album);
    setFigus(prevFigus);
    // Guardar sesión en localStorage para recordar al usuario
    localStorage.setItem("fb_current_user", userId);
    setUser(userData);
    // Chequear sobres pendientes de confirmación
    const sobres = DBSobres.getMios(userId);
    const pendientes = sobres.filter(s => s.estado === "pendiente" &&
      (s.userA === userId ? !s.confirmadoA : !s.confirmadoB));
    if(pendientes.length > 0) setPendienteConfirm(pendientes[0]);
  };

  // Ver sobre desde match
  const handleVerSobre = (match) => {
    if(!user) return;
    // Buscar si ya existe sobre entre estos dos usuarios esta semana
    const semana = getSemanaKey();
    const sobres = DBSobres.getMios(user.userId);
    const existente = sobres.find(s =>
      s.semana === semana &&
      ((s.userA === user.userId && s.userB === match.userId) ||
       (s.userB === user.userId && s.userA === match.userId))
    );
    if(existente) {
      setSobreActivo(existente);
      setTab("sobre");
      return;
    }
    // Crear nuevo sobre
    const codigo = generarCodigoSobre();
    const soyA = true;
    const nuevoSobre = {
      codigo,
      semana,
      estado: "pendiente",
      userA: user.userId,
      apodoA: user.apodo,
      celA: user.telefono,
      userB: match.userId,
      apodoB: match.apodo,
      celB: match.edad ? "" : "", // en prod vendría del DB
      figusDe: match.yoLeDoy,     // lo que yo le doy
      figusParA: match.elMeDa,    // lo que él me da
      punto: null,
      confirmadoA: false,
      confirmadoB: false,
      advertenciaVista: false,
      createdAt: Date.now(),
    };
    DBSobres.save(codigo, nuevoSobre);
    setSobreActivo(nuevoSobre);
    setTab("sobre");
  };

  const handleConfirmarSobre = (codigo) => {
    const resultado = DBSobres.confirmar(codigo, user.userId);
    if(resultado) setSobreActivo(resultado);
    setPendienteConfirm(null);
    setTab("matches");
  };

  const handleAnularSobre = (codigo, motivo) => {
    DBSobres.anular(codigo, motivo);
    DBRep.penalizar(user.userId, 1);
    setSobreActivo(null);
    setPendienteConfirm(null);
    setTab("matches");
  };

  // Sincronizar figuritas → base de datos y recalcular match count
  const handleSetFigus = async newFigus => {
    setFigus(newFigus);
    if (user) {
      // Guardar en Firebase + localStorage
      await DB.saveFigus(user.userId, user.albumId, newFigus);
      setTimeout(() => {
        const todos   = DB.getAllUsers();
        const fresh   = DB.getFigus(user.userId, user.albumId);
        const matches = calcularMatches(user.userId, user.albumId, fresh, todos);
        setMatchCount(matches.length);
      }, 500);
    }
  };

  // Actualizar match count cuando cambia el usuario
  useEffect(() => {
    if (user) {
      const todos   = DB.getAllUsers();
      const matches = calcularMatches(user.userId, user.albumId, figus, todos);
      setMatchCount(matches.length);
    }
  }, [user]);



  const goTo = t => { setTab(t); setChatMatch(null); setTicketData(null); };

  const render = () => {
    if (tab==="ticket" && ticketData)
      return <TicketScreen match={ticketData.match} punto={ticketData.punto} user={user} onBack={()=>setTab("chat")}/>;
    if (tab==="chat" && chatMatch)
      return <ChatScreen match={chatMatch} user={user} onBack={()=>setTab("matches")}
        onVerTicket={(m,p)=>{setTicketData({match:m,punto:p});setTab("ticket");}}
        onFigurasEntregadas={async (figusDadas) => {
          // Las figuritas entregadas pasan de "repetida" → "tengo"
          // Usamos handleSetFigus que ya sabe guardar en Firebase + localStorage
          setFigus(prev => {
            const updated = {...prev};
            figusDadas.forEach(cod => { updated[cod] = "tengo"; });
            // Guardar de forma asíncrona usando el estado actualizado
            DB.saveFigus(user.userId, user.albumId, updated);
            return updated;
          });
        }}/>;
    switch(tab) {
      case "home":    return <HomeScreen user={user} figus={figus} setTab={setTab} matchCount={matchCount}/>;
      case "album":   return <AlbumScreen user={user} figus={figus} setFigus={handleSetFigus}/>;
      case "contactos": return <ContactosScreen user={user}/>;
      case "puntos":  return <PuntosScreen/>;
      case "ahorro":  return <AhorroScreen figus={figus}/>;
      case "perfil":  return <PerfilScreen user={user} figus={figus} adsEnabled={adsEnabled} setAdsEnabled={setAdsEnabled}/>;
      default:        return <HomeScreen user={user} figus={figus} setTab={setTab} matchCount={matchCount}/>;
    }
  };

  // Sincronizar con Firebase y recalcular cuando se va a Matches
  useEffect(() => {
    if (tab === "matches" && user) {
      // Sincronizar datos frescos de Firebase
      Promise.all([DB.syncUsuarios(), DB.syncFiguritas()]).then(() => {
        const todos  = DB.getAllUsers();
        const fresh  = DB.getFigus(user.userId, user.albumId);
        const result = calcularMatches(user.userId, user.albumId, fresh, todos);
        setMatchCount(result.length);
      });
    }
  }, [tab]);

  const navTab = ["chat","ticket","sobre"].includes(tab) ? "contactos" : tab;

  return (
    <>
      <style>{css}</style>
      <div className="shell" style={{position:"relative"}}>
        {!user
          ? <OnboardingScreen onDone={handleRegister}/>
          : <>
              {/* BOTÓN INICIO — arriba izquierda dentro del shell */}
              {!["home","chat","sobre","album"].includes(tab) && (
                <button onClick={()=>goTo("home")} style={{
                  position:"absolute",top:12,left:12,zIndex:200,
                  background:"white",border:`2px solid ${C.blueDark}`,
                  borderRadius:12,width:38,height:38,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:20,cursor:"pointer",
                  boxShadow:`2px 2px 0 ${C.blue}`}}>
                  🏠
                </button>
              )}
              {render()}
              <BottomNav active={navTab} setActive={goTo} matchCount={matchCount}/>
              {/* POPUP DE CONFIRMACIÓN PENDIENTE */}
              {pendienteConfirm && tab !== "sobre" && (
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",
                  display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
                  <div style={{background:"white",borderRadius:20,padding:24,width:"100%",
                    maxWidth:360,border:`3px solid ${C.blue}`,boxShadow:`5px 5px 0 ${C.blue}`}}>
                    <div style={{fontFamily:"'Paytone One',cursive",fontSize:18,color:C.blueDark,marginBottom:8}}>
                      📬 Sobre pendiente
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:C.muted,lineHeight:1.6,marginBottom:16}}>
                      Tenés un intercambio pendiente de confirmar.<br/>
                      Código: <strong style={{color:C.blueDark}}>{pendienteConfirm.codigo}</strong>
                    </div>
                    <button className="btn" style={{marginBottom:8}}
                      onClick={()=>{setSobreActivo(pendienteConfirm);setTab("sobre");setPendienteConfirm(null);}}>
                      📦 Ver el sobre
                    </button>
                    <button className="btn2" onClick={()=>setPendienteConfirm(null)}>
                      Más tarde
                    </button>
                  </div>
                </div>
              )}
            </>
        }
      </div>
    </>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
